<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Editar Cliente</title>
        <link rel="stylesheet" href="/static/style.css">
        <a href="/">← Voltar ao início</a>
    </head>
    <body>
        <h1>Editar Cliente</h1>
        <form id="form-editar-cliente" action="/clientes/{{ cliente.id }}/editar" method="POST">
            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" value="{{ cliente.nome }}" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ cliente.email }}" required>
            </div>

            <div>
                <label for="numero_telefone">Número de telefone</label>
                <input type="text" id="numero_telefone" name="numero_telefone" value="{{ cliente.numero_telefone }}" required>
            </div>

            <div>
                <label for="empresa">Empresa</label>
                <input type="text" id="empresa" name="empresa" value="{{ cliente.empresa }}" required>
            </div>

            <div class="form-group">
                <label for="data_nascimento">Data de nascimento</label>
                <input type="date" id="data_nascimento" name="data_nascimento" value="{{ cliente.data_nascimento.strftime('%Y-%m-%d') }}" required>
            </div>

            <button type="submit" class="btn">Salvar</button>
        </form>
    </body>
